#!/usr/bin/env bash

# Shared Parallels Desktop defaults. These are host/hypervisor preferences,
# not guest OS settings, so they live outside distro-specific target trees.

: "${PRL_AUTOSTART:=off}"
: "${PRL_AUTOSTOP:=suspend}"
: "${PRL_STARTUP_VIEW:=headless}"
: "${PRL_ON_SHUTDOWN:=close}"
: "${PRL_ON_WINDOW_CLOSE:=suspend}"
: "${PRL_PAUSE_IDLE:=off}"
: "${PRL_ADAPTIVE_HYPERVISOR:=auto}"
: "${PRL_NESTED_VIRT:=auto}"

: "${PRL_SHARED_PROFILE:=off}"
: "${PRL_SMART_MOUNT:=off}"
: "${PRL_SHARE_HOST_FOLDERS:=on}"
: "${PRL_SHARE_HOST_FOLDERS_AUTOMOUNT:=on}"
: "${PRL_SHARE_HOST_FOLDERS_DEFINED:=}"
: "${PRL_SHARE_HOST_FOLDER_DOWNLOADS:=on}"
: "${PRL_SHARE_HOST_FOLDER_DOWNLOADS_NAME:=Downloads}"
: "${PRL_SHARE_HOST_FOLDER_DOWNLOADS_PATH:=${HOME}/Downloads}"
: "${PRL_SHARE_HOST_FOLDER_DEVELOP:=off}"
: "${PRL_SHARE_HOST_FOLDER_DEVELOP_NAME:=Develop}"
: "${PRL_SHARE_HOST_FOLDER_DEVELOP_PATH:=${HOME}/Develop}"
: "${PRL_SHARE_GUEST_FOLDERS:=off}"

: "${PRL_SHARED_CLIPBOARD:=on}"
: "${PRL_TIME_SYNC:=on}"
: "${PRL_HDD_ONLINE_COMPACT:=on}"
: "${PRL_SHARED_CLOUD:=off}"
: "${PRL_SYNC_HOST_PRINTERS:=off}"
: "${PRL_SYNC_DEFAULT_PRINTER:=off}"
: "${PRL_SHOW_HOST_PRINTER_UI:=off}"
: "${PRL_SOUND:=off}"
: "${PRL_MICROPHONE:=off}"
: "${PRL_AUTO_SHARE_CAMERA:=off}"

: "${PRL_FULL_SCREEN_USE_ALL_DISPLAYS:=off}"
: "${PRL_COHERENCE_AUTO_SWITCH_FULLSCREEN:=off}"
: "${PRL_SHOW_GUEST_NOTIFICATIONS:=off}"
: "${PRL_SHOW_GUEST_APP_FOLDER_IN_DOCK:=off}"
: "${PRL_BOUNCE_DOCK_ICON_WHEN_APP_FLASHES:=off}"
: "${PRL_SH_APP_HOST_TO_GUEST:=off}"
: "${PRL_SH_APP_GUEST_TO_HOST:=off}"
: "${PRL_WINSYSTRAY_IN_MACMENU:=off}"

# These settings may still need GUI verification depending on what prlctl exposes.
: "${PRL_PICTURE_IN_PICTURE:=off}"
: "${PRL_TRAVEL_MODE_ENTER:=never}"
: "${PRL_TRAVEL_MODE_QUIT:=never}"
: "${PRL_AUTO_UPDATE_TOOLS:=on}"
