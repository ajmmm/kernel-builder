#!/usr/bin/env bash

: "${VM_USERNAME:=ajm}"
: "${VM_CPUS:=8}"
: "${VM_MEMORY_MB:=16384}"
: "${VM_DISK_GB:=300}"
: "${VM_TIMEZONE:=Europe/London}"
: "${VM_KEYBOARD_LAYOUT:=gb}"
: "${VM_KEYBOARD_MODEL:=pc105}"
: "${VM_KEYBOARD_VARIANT:=mac_intl}"
: "${VM_KEYBOARD_OPTIONS:=}"
: "${VM_KEYBOARD_VC_KEYMAP:=gb-mac_intl}"
: "${VM_K8S_CHANNEL:=v1.35}"
: "${VM_CHRONY_MAKESTEP:=1.0 3}"
: "${VM_DISABLE_FIREWALLD:=true}"
: "${VM_IMAGE_ARTIFACTS_URL_ARM64:=https://www.mirrorservice.org/sites/dl.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/aarch64/images/}"
: "${VM_IMAGE_ARTIFACTS_URL_AMD64:=https://www.mirrorservice.org/sites/dl.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/}"
: "${VM_IMAGE_NAME_REGEX:=Fedora-Cloud-Base-Generic-[^\"]*\\.${VM_ARCH}\\.qcow2}"
: "${VM_CHECKSUM_NAME_REGEX:=Fedora-Cloud-[^\"]*-CHECKSUM}"
: "${VM_PRL_DISTRIBUTION:=fc}"
: "${VM_BOOT_PARTITION_DEVICE:=/dev/sda2}"
: "${VM_ROOT_PARTITION_DEVICE:=/dev/sda3}"

: "${VM_NET_COUNT:=3}"

: "${VM_NET_0_NAME:=eth-shared}"
: "${VM_NET_0_TYPE:=shared}"
: "${VM_NET_0_PRL_IFACE:=}"
: "${VM_NET_0_MAC:=001C42FC4310}"
: "${VM_NET_0_IPV4_METHOD:=static}"
: "${VM_NET_0_IPV4_ADDRESS:=10.211.55.120/24}"
: "${VM_NET_0_IPV4_GATEWAY:=}"
: "${VM_NET_0_IPV4_DNS:=}"
: "${VM_NET_0_ROUTE_METRIC:=200}"
: "${VM_NET_0_NEVER_DEFAULT:=yes}"

: "${VM_NET_1_NAME:=eth-real}"
: "${VM_NET_1_TYPE:=bridged}"
: "${VM_NET_1_PRL_IFACE:=Wi-Fi}"
: "${VM_NET_1_MAC:=001C42FC4311}"
: "${VM_NET_1_IPV4_METHOD:=static}"
: "${VM_NET_1_IPV4_ADDRESS:=192.168.0.120/24}"
: "${VM_NET_1_IPV4_GATEWAY:=192.168.0.1}"
: "${VM_NET_1_IPV4_DNS:=192.168.0.1}"
: "${VM_NET_1_ROUTE_METRIC:=100}"
: "${VM_NET_1_NEVER_DEFAULT:=no}"

: "${VM_NET_2_NAME:=eth-hostonly}"
: "${VM_NET_2_TYPE:=host-only}"
: "${VM_NET_2_PRL_IFACE:=Host-Only}"
: "${VM_NET_2_MAC:=001C42FC4312}"
: "${VM_NET_2_IPV4_METHOD:=disabled}"
: "${VM_NET_2_IPV4_ADDRESS:=}"
: "${VM_NET_2_IPV4_GATEWAY:=}"
: "${VM_NET_2_IPV4_DNS:=}"
: "${VM_NET_2_ROUTE_METRIC:=300}"
: "${VM_NET_2_NEVER_DEFAULT:=yes}"
